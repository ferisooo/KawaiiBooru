<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Defense in depth: only local scripts run; images come from local files or
       the base64 data URIs the backend proxy returns. No remote code, ever. -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'" />
  <title>KawaiiBooru</title>
  <!-- fonts are bundled locally (renderer/fonts) so the app never contacts Google -->
  <link rel="stylesheet" href="fonts/fonts.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-fx"></div>
  <canvas id="bg-particles"></canvas>
  <canvas id="trail-canvas"></canvas>
  <div id="root"></div>

  <!-- everything local, no CDN -->
  <script src="vendor/react.js"></script>
  <script src="vendor/react-dom.js"></script>
  <script src="app.js"></script>
</body>
</html>
